<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Exercício 15 - Lançamento de Produto</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Trebuchet MS', sans-serif;
      background: #0a0a0a;
      color: white;
      text-align: center;
      padding: 40px 20px;
    }

    h1 { font-size: 2.4rem; color: #f0c040; margin-bottom: 8px; }
    .sub { color: #aaa; font-size: 1rem; margin-bottom: 30px; }

    img.produto {
      width: 100%;
      max-width: 360px;
      border-radius: 14px;
      margin-bottom: 30px;
    }

    .countdown {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-bottom: 30px;
    }

    .bloco {
      background: #1a1a1a;
      border: 2px solid #f0c040;
      border-radius: 10px;
      padding: 14px 20px;
      animation: pulsar 1.5s ease-in-out infinite;
    }

    @keyframes pulsar {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(240,192,64,0.3); }
      50% { transform: scale(1.04); box-shadow: 0 0 16px 4px rgba(240,192,64,0.2); }
    }

    .bloco span {
      display: block;
      font-size: 2rem;
      font-weight: bold;
      color: #f0c040;
    }

    .bloco small {
      font-size: 0.7rem;
      color: #888;
      text-transform: uppercase;
    }

    time { font-size: 0.85rem; color: #666; display: block; margin-bottom: 30px; }

    .recursos {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }

    .recurso {
      background: #1a1a1a;
      padding: 14px 20px;
      border-radius: 8px;
      font-size: 0.9rem;
      color: #ddd;
      border: 1px solid #333;
    }

    form {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    form input {
      padding: 12px 16px;
      border: 1px solid #444;
      border-radius: 6px;
      background: #1a1a1a;
      color: white;
      font-size: 0.95rem;
      width: 240px;
      outline: none;
    }

    form button {
      padding: 12px 24px;
      background: #f0c040;
      color: #0a0a0a;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      font-size: 0.95rem;
    }

    form button:hover { background: #d4a800; }
  </style>
</head>
<body>
  <h1>🚀 Novo Produto em Breve</h1>
  <p class="sub">Prepare-se para o lançamento mais esperado do ano!</p>

  <img class="produto" src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8?w=600" alt="Produto">

  <div class="countdown" id="countdown">
    <div class="bloco"><span id="dias">00</span><small>Dias</small></div>
    <div class="bloco"><span id="horas">00</span><small>Horas</small></div>
    <div class="bloco"><span id="min">00</span><small>Minutos</small></div>
    <div class="bloco"><span id="seg">00</span><small>Segundos</small></div>
  </div>

  <time datetime="2025-06-01">Lançamento previsto: 01 de Junho de 2025</time>

  <div class="recursos">
    <div class="recurso">⚡ Ultra Rápido</div>
    <div class="recurso">🔒 100% Seguro</div>
    <div class="recurso">🌍 Sustentável</div>
    <div class="recurso">🎨 Design Exclusivo</div>
  </div>

  <form>
    <input type="email" placeholder="Seu e-mail para pré-venda">
    <button type="submit">Quero ser avisado</button>
  </form>

  <script>
    const lancamento = new Date('2025-06-01T00:00:00');

    function atualizar() {
      const agora = new Date();
      const diff = lancamento - agora;
      if (diff <= 0) return;

      const dias  = Math.floor(diff / 86400000);
      const horas = Math.floor((diff % 86400000) / 3600000);
      const min   = Math.floor((diff % 3600000) / 60000);
      const seg   = Math.floor((diff % 60000) / 1000);

      document.getElementById('dias').textContent  = String(dias).padStart(2, '0');
      document.getElementById('horas').textContent = String(horas).padStart(2, '0');
      document.getElementById('min').textContent   = String(min).padStart(2, '0');
      document.getElementById('seg').textContent   = String(seg).padStart(2, '0');
    }

    atualizar();
    setInterval(atualizar, 1000);
  </script>
</body>
</html>
