<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Exercício 9 - Lista de Tarefas</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Trebuchet MS', sans-serif;
      background: #f3f4f6;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }

    .container {
      background: white;
      padding: 32px;
      border-radius: 14px;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 1.6rem;
      color: #333;
      margin-bottom: 20px;
    }

    .add-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .add-row input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.95rem;
      outline: none;
    }

    .add-row button {
      padding: 10px 16px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
    }

    ul { list-style: none; }

    li {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 8px;
      border-bottom: 1px solid #f0f0f0;
    }

    li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    li span {
      flex: 1;
      font-size: 0.95rem;
      color: #333;
      text-decoration: none;
    }

    li.done span {
      text-decoration: line-through;
      color: #aaa;
    }

    .btn-del {
      background: none;
      border: none;
      color: #e74c3c;
      cursor: pointer;
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📝 Minhas Tarefas</h1>
    <div class="add-row">
      <input type="text" id="taskInput" placeholder="Nova tarefa...">
      <button onclick="addTask()">Adicionar</button>
    </div>
    <ul id="taskList">
      <li>
        <input type="checkbox" onchange="toggleDone(this)">
        <span>Estudar HTML e CSS</span>
        <button class="btn-del" onclick="removeTask(this)">✕</button>
      </li>
      <li class="done">
        <input type="checkbox" checked onchange="toggleDone(this)">
        <span>Criar repositório no GitHub</span>
        <button class="btn-del" onclick="removeTask(this)">✕</button>
      </li>
    </ul>
  </div>

  <script>
    function addTask() {
      const input = document.getElementById('taskInput');
      const text = input.value.trim();
      if (!text) return;

      const li = document.createElement('li');
      li.innerHTML = `
        <input type="checkbox" onchange="toggleDone(this)">
        <span>${text}</span>
        <button class="btn-del" onclick="removeTask(this)">✕</button>
      `;
      document.getElementById('taskList').appendChild(li);
      input.value = '';
    }

    function toggleDone(cb) {
      cb.parentElement.classList.toggle('done', cb.checked);
    }

    function removeTask(btn) {
      btn.parentElement.remove();
    }
  </script>
</body>
</html>
