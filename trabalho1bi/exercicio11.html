<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Exercício 11 - Mapa do Site</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Courier New', monospace;
      background: #1e1e2e;
      color: #cdd6f4;
      padding: 40px 20px;
    }

    h1 {
      font-size: 1.8rem;
      color: #89b4fa;
      margin-bottom: 30px;
      text-align: center;
    }

    .mapa {
      max-width: 500px;
      margin: 0 auto;
    }

    ul {
      list-style: none;
    }

    ul li {
      padding: 6px 0;
      font-size: 0.95rem;
      border-left: 2px solid #45475a;
      text-indent: 16px;
      color: #cdd6f4;
    }

    ul li a {
      color: #89dceb;
      text-decoration: none;
    }

    ul li a:hover { color: #cba6f7; }

    ul ul {
      margin-left: 20px;
    }

    ul ul li {
      border-left: 2px dashed #6c7086;
      text-indent: 16px;
      color: #a6adc8;
    }

    .raiz {
      font-size: 1.1rem;
      font-weight: bold;
      color: #cba6f7;
      border-left: none !important;
      text-indent: 0 !important;
      padding-bottom: 10px;
    }
  </style>
</head>
<body>
  <h1>🗺️ Mapa do Site</h1>
  <div class="mapa">
    <ul>
      <li class="raiz">🌐 www.meusite.com</li>
      <li><a href="#">🏠 Início</a></li>
      <li><a href="#">👤 Sobre</a>
        <ul>
          <li><a href="#">História</a></li>
          <li><a href="#">Equipe</a></li>
        </ul>
      </li>
      <li><a href="#">💼 Portfólio</a>
        <ul>
          <li><a href="#">Projetos Web</a></li>
          <li><a href="#">Design</a></li>
          <li><a href="#">Fotografias</a></li>
        </ul>
      </li>
      <li><a href="#">📝 Blog</a>
        <ul>
          <li><a href="#">Artigos</a></li>
          <li><a href="#">Tutoriais</a></li>
        </ul>
      </li>
      <li><a href="#">📬 Contato</a></li>
    </ul>
  </div>
</body>
</html>
