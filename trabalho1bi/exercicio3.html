<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Exercício 3 - Portfólio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Trebuchet MS', sans-serif;
      background: #1a1a2e;
      color: white;
      padding: 40px 20px;
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 32px;
      color: #e94560;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      max-width: 900px;
      margin: 0 auto;
    }

    .item {
      background: #16213e;
      border-radius: 10px;
      overflow: hidden;
      transition: transform 0.2s;
    }

    .item:hover {
      transform: translateY(-4px);
    }

    .item img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }

    .item p {
      padding: 12px;
      font-size: 0.9rem;
      color: #ccc;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>Meu Portfólio</h1>
  <div class="grid">
    <div class="item">
      <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400" alt="Projeto 1">
      <p>Exercício 1 — Introdução</p>
    </div>
    <div class="item">
      <img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?w=400" alt="Projeto 2">
      <p>Exercício 2 — Perfil</p>
    </div>
    <div class="item">
      <img src="https://images.unsplash.com/photo-1519389950473-47ba0277781c?w=400" alt="Projeto 4">
      <p>Exercício 4 — Blog</p>
    </div>
    <div class="item">
      <img src="https://images.unsplash.com/photo-1534536281715-e28d76689b4d?w=400" alt="Projeto 5">
      <p>Exercício 5 — Contato</p>
    </div>
    <div class="item">
      <img src="https://images.unsplash.com/photo-1512820790803-83ca734da794?w=400" alt="Projeto 6">
      <p>Exercício 6 — FAQ</p>
    </div>
    <div class="item">
      <img src="https://images.unsplash.com/photo-1555099962-4199c345e5dd?w=400" alt="Projeto 7">
      <p>Exercício 7 — Login</p>
    </div>
  </div>
</body>
</html>
