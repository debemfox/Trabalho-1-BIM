<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Exercício 8 - Produto</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Trebuchet MS', sans-serif;
      background: #f9f9f9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .product {
      background: white;
      border-radius: 14px;
      overflow: hidden;
      max-width: 380px;
      width: 100%;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    .product img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }

    .info {
      padding: 24px;
    }

    h2 {
      font-size: 1.4rem;
      color: #222;
      margin-bottom: 8px;
    }

    .desc {
      font-size: 0.9rem;
      color: #666;
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .price {
      font-size: 1.6rem;
      font-weight: bold;
      color: #27ae60;
      margin-bottom: 16px;
    }

    button {
      box-sizing: border-box;
      width: 100%;
      padding: 14px 20px;
      background: #27ae60;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #1e8449; }
  </style>
</head>
<body>
  <div class="product">
    <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=500" alt="Produto">
    <div class="info">
      <h2>Relógio Minimalista</h2>
      <p class="desc">Elegante e moderno, perfeito para qualquer ocasião. Pulseira de couro legítimo e vidro temperado.</p>
      <div class="price">R$ 299,90</div>
      <button>🛒 Comprar Agora</button>
    </div>
  </div>
</body>
</html>
