<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Perfil Pessoal</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            text-align: center;
            padding: 50px;
        }

        .perfil {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        img {
            width: 150px;
            height: 150px;
            object-fit: cover;

            /* Bordas arredondadas */
            border-radius: 50%;
        }

        h1 {
            margin-top: 15px;
        }

        p {
            color: #555;
        }

        .redes a {
            display: inline-block;
            margin: 10px;
            text-decoration: none;
            color: #0077cc;
            font-weight: bold;
        }

        .redes a:hover {
            color: #005999;
        }
    </style>
</head>
<body>

    <div class="perfil">
        <img src="https://imgs.search.brave.com/wq3wT7a0iRgM7nLMT6J2ftFQ-7GmU3IyRCFc-a5otKw/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly90c2Ux/Lm1tLmJpbmcubmV0/L3RoP2lkPU9JUC5C/aG1tZk9LSGhEdjJM/Mmw5bFIyRjl3SGFK/NCZwaWQ9MTUuMQ" alt="Foto de perfil">

        <h1>Seu Nome</h1>

        <p>
            Olá! Sou um estudante de desenvolvimento web e estou aprendendo
            HTML e CSS para criar páginas bonitas e funcionais.
        </p>

        <div class="redes">
            <a href="#">Instagram</a>
            <a href="#">LinkedIn</a>
            <a href="#">GitHub</a>
        </div>
    </div>

</body>
</html>
