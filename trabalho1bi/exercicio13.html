<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Exercício 13 - Promoções</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Trebuchet MS', sans-serif;
      background: #fff5f5;
      padding: 40px 20px;
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      color: #c0392b;
      margin-bottom: 32px;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      max-width: 900px;
      margin: 0 auto;
    }

    .card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      width: 250px;
      box-shadow: 0 3px 12px rgba(0,0,0,0.08);
    }

    .card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
    }

    .card-body { padding: 16px; }

    .card h3 {
      font-size: 1rem;
      color: #222;
      margin-bottom: 6px;
    }

    .card p {
      font-size: 0.85rem;
      color: #777;
      line-height: 1.5;
      margin-bottom: 12px;
    }

    .precos {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    del {
      color: #aaa;
      font-size: 0.95rem;
    }

    .novo {
      color: #c0392b;
      font-weight: bold;
      font-size: 1.2rem;
    }

    .badge {
      display: inline-block;
      background: #c0392b;
      color: white;
      font-size: 0.7rem;
      padding: 3px 8px;
      border-radius: 20px;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <h1>🔥 Ofertas Especiais</h1>
  <div class="grid">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400" alt="Relógio">
      <div class="card-body">
        <span class="badge">-40%</span>
        <h3>Relógio Clássico</h3>
        <p>Design atemporal com pulseira de couro.</p>
        <div class="precos">
          <del>R$ 499,00</del>
          <span class="novo">R$ 299,00</span>
        </div>
      </div>
    </div>
    <div class="card">
      <img src="https://images.unsplash.com/photo-1585386959984-a4155224a1ad?w=400" alt="Perfume">
      <div class="card-body">
        <span class="badge">-30%</span>
        <h3>Perfume Premium</h3>
        <p>Fragrância exclusiva e duradoura.</p>
        <div class="precos">
          <del>R$ 350,00</del>
          <span class="novo">R$ 245,00</span>
        </div>
      </div>
    </div>
    <div class="card">
      <img src="https://images.unsplash.com/photo-1491553895911-0055eca6402d?w=400" alt="Tênis">
      <div class="card-body">
        <span class="badge">-25%</span>
        <h3>Tênis Esportivo</h3>
        <p>Conforto e estilo para o dia a dia.</p>
        <div class="precos">
          <del>R$ 400,00</del>
          <span class="novo">R$ 299,00</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
