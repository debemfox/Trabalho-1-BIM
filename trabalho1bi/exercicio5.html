<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Exercício 5 - Contato</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Trebuchet MS', sans-serif;
      background: #e8f0fe;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    form {
      background: white;
      padding: 40px;
      border-radius: 12px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 30px rgba(66, 133, 244, 0.25);
    }

    h2 {
      margin-bottom: 24px;
      color: #1a73e8;
      font-size: 1.6rem;
    }

    label {
      display: block;
      margin-bottom: 4px;
      font-size: 0.85rem;
      color: #555;
    }

    input, textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 6px;
      margin-bottom: 16px;
      font-size: 0.95rem;
      outline: none;
      transition: border 0.2s;
    }

    input:focus, textarea:focus {
      border-color: #1a73e8;
    }

    textarea { height: 100px; resize: vertical; }

    button {
      width: 100%;
      padding: 12px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
    }

    button:hover { background: #1558b0; }
  </style>
</head>
<body>
  <form>
    <h2>Fale Conosco</h2>
    <label>Nome</label>
    <input type="text" placeholder="Seu nome">
    <label>E-mail</label>
    <input type="email" placeholder="seu@email.com">
    <label>Mensagem</label>
    <textarea placeholder="Escreva sua mensagem..."></textarea>
    <button type="submit">Enviar Mensagem</button>
  </form>
</body>
</html>
